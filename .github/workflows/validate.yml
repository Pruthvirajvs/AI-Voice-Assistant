name: Validate Project

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check required files
        run: |
          test -f README.md
          test -f assistant.py
          test -f requirements.txt
          test -f index.html
          test -f styles.css
          test -f script.js
          test -f LICENSE

      - name: Compile Python source
        run: python -m py_compile assistant.py

      - name: Check for unresolved placeholders
        run: |
          if grep -R "TODO\|FIXME\|YOUR_API_KEY" -n README.md assistant.py index.html styles.css script.js docs; then
            echo "Unresolved placeholder found."
            exit 1
          fi
